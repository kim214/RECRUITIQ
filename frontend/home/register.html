<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Reqruit IQ</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo-center"><a href="index.html" class="logo"><span class="logo-icon">IQ</span> Reqruit IQ</a></div>
      <h1>Create account</h1>
      <p class="subtitle">Join Reqruit IQ today</p>
      <div id="alert" class="alert hidden"></div>
      <form id="register-form">
        <div class="role-select">
          <div class="role-option selected" data-role="applicant">
            <div class="icon">👤</div>
            <div class="label">Applicant</div>
          </div>
          <div class="role-option" data-role="employer">
            <div class="icon">🏢</div>
            <div class="label">Employer</div>
          </div>
        </div>
        <input type="hidden" name="role" value="applicant" />
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="fullName" class="form-control" required />
        </div>
        <div class="form-group" id="company-group" style="display:none">
          <label>Company Name</label>
          <input type="text" name="company" class="form-control" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" class="form-control" required minlength="6" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
      </form>
      <p class="auth-footer">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>
  <script src="../scripts/api.js"></script>
  <script>
    let selectedRole = 'applicant';
    document.querySelectorAll('.role-option').forEach((opt) => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.role-option').forEach((o) => o.classList.remove('selected'));
        opt.classList.add('selected');
        selectedRole = opt.dataset.role;
        document.querySelector('[name=role]').value = selectedRole;
        document.getElementById('company-group').style.display = selectedRole === 'employer' ? 'block' : 'none';
      });
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const alertEl = document.getElementById('alert');
      try {
        const { token, user } = await api.register({
          fullName: f.fullName.value,
          email: f.email.value,
          password: f.password.value,
          role: selectedRole,
          company: f.company?.value,
        });
        setAuth(token, user);
        redirectByRole(user.role);
      } catch (err) {
        alertEl.className = 'alert alert-error';
        alertEl.textContent = err.message;
        alertEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
