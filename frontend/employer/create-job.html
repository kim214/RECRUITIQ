<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Job — Reqruit IQ</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><a href="../home/index.html" class="logo"><span class="logo-icon">IQ</span> Reqruit IQ</a></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" data-page="dashboard"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="create-job.html" data-page="create-job"><span class="nav-icon">➕</span> Post Job</a>
        <a href="candidates.html" data-page="candidates"><span class="nav-icon">👥</span> Candidates</a>
        <a href="shortlist.html" data-page="shortlist"><span class="nav-icon">✅</span> Shortlisting</a>
        <a href="rankings.html" data-page="rankings"><span class="nav-icon">🏆</span> AI Rankings</a>
        <a href="reports.html" data-page="reports"><span class="nav-icon">📈</span> Reports</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip"><div class="user-avatar" id="user-avatar">E</div><div><div class="name" id="user-name"></div><div class="role" id="user-role"></div></div></div>
        <a href="#" id="logout-btn" class="btn btn-ghost btn-sm mt-2" style="width:100%;color:#94a3b8">Logout</a>
      </div>
    </aside>
    <main class="dashboard-main">
      <header class="dashboard-topbar"><h1>Post a New Job</h1></header>
      <div class="dashboard-content">
        <div class="panel" style="max-width:720px">
          <div class="panel-body">
            <div id="form-alert" class="alert hidden"></div>
            <form id="job-form">
              <div class="form-group">
                <label>Job Title *</label>
                <input type="text" name="title" class="form-control" required placeholder="e.g. Senior Software Engineer" />
              </div>
              <div class="form-group">
                <label>Location</label>
                <input type="text" name="location" class="form-control" placeholder="e.g. Nairobi, Kenya or Remote" />
              </div>
              <div class="form-group">
                <label>Employment Type</label>
                <select name="employmentType" class="form-control">
                  <option value="full-time">Full-time</option>
                  <option value="part-time">Part-time</option>
                  <option value="contract">Contract</option>
                  <option value="internship">Internship</option>
                </select>
              </div>
              <div class="form-group">
                <label>Job Description *</label>
                <textarea name="description" class="form-control" required rows="5" placeholder="Describe the role, responsibilities, and team..."></textarea>
              </div>
              <div class="form-group">
                <label>Required Skills (comma-separated) *</label>
                <input type="text" name="requiredSkills" class="form-control" required placeholder="JavaScript, React, Node.js, SQL" />
              </div>
              <div class="form-group">
                <label>Minimum Experience (years)</label>
                <input type="number" name="minExperience" class="form-control" min="0" value="0" />
              </div>
              <div class="form-group">
                <label>Required Education</label>
                <input type="text" name="requiredEducation" class="form-control" placeholder="e.g. Bachelor's in Computer Science" />
              </div>
              <div class="form-group">
                <label>Required Certifications (comma-separated)</label>
                <input type="text" name="requiredCertifications" class="form-control" placeholder="AWS Certified, PMP" />
              </div>
              <button type="submit" class="btn btn-primary">Publish Job</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../scripts/api.js"></script>
  <script src="../scripts/dashboard.js"></script>
  <script>
    requireAuth(['employer']);
    initSidebar('create-job');
    document.getElementById('job-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const alertEl = document.getElementById('form-alert');
      try {
        const skills = f.requiredSkills.value.split(',').map((s) => s.trim()).filter(Boolean);
        const certs = f.requiredCertifications.value.split(',').map((s) => s.trim()).filter(Boolean);
        await api.createJob({
          title: f.title.value,
          location: f.location.value,
          employmentType: f.employmentType.value,
          description: f.description.value,
          requiredSkills: skills,
          minExperience: parseInt(f.minExperience.value, 10) || 0,
          requiredEducation: f.requiredEducation.value,
          requiredCertifications: certs,
        });
        alertEl.className = 'alert alert-success';
        alertEl.textContent = 'Job published successfully!';
        alertEl.classList.remove('hidden');
        f.reset();
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
      } catch (err) {
        alertEl.className = 'alert alert-error';
        alertEl.textContent = err.message;
        alertEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
