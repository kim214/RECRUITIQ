<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Job — RecruitIQ</title>
  <link rel="icon" href="../assets/images/logo-icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body class="portal-employer">
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><a href="../home/index.html" class="logo"><img src="../assets/images/logo-icon.svg" alt="" width="36" height="36" /><span class="logo-text">Recruit<strong>IQ</strong></span></a></div>
      <span class="sidebar-badge">Employer Portal</span>
      <nav class="sidebar-nav">
        <a href="dashboard.html" data-page="dashboard"><span class="nav-icon-svg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span> Dashboard</a>
        <a href="create-job.html" data-page="create-job"><span class="nav-icon-svg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></span> Post Job</a>
        <a href="candidates.html" data-page="candidates"><span class="nav-icon-svg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Candidates</a>
        <a href="shortlist.html" data-page="shortlist"><span class="nav-icon-svg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span> Shortlisting</a>
        <a href="rankings.html" data-page="rankings"><span class="nav-icon-svg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 7h7l-5.5 4.5 2 7L12 17l-6.5 3.5 2-7L2 9h7z"/></svg></span> AI Rankings</a>
        <a href="reports.html" data-page="reports"><span class="nav-icon-svg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 5-6"/></svg></span> Reports</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip"><div class="user-avatar" id="user-avatar">E</div><div><div class="name" id="user-name"></div><div class="role" id="user-role"></div></div></div>
        <a href="#" id="logout-btn" class="btn btn-ghost btn-sm mt-2" style="width:100%;color:#94a3b8">Logout</a>
      </div>
    </aside>
    <main class="dashboard-main">
      <header class="dashboard-topbar"><h1>Post a New Job</h1></header>
      <div class="dashboard-content">
        <div class="panel" style="max-width:720px">
          <div class="panel-body">
            <div id="post-as-banner" class="alert alert-info" style="margin-bottom:1rem"></div>
            <div id="form-alert" class="alert hidden"></div>
            <form id="job-form">
              <div class="form-group">
                <label>Job Title *</label>
                <input type="text" name="title" class="form-control" required placeholder="e.g. Senior Software Engineer" />
              </div>
              <div class="form-group">
                <label>Location</label>
                <input type="text" name="location" class="form-control" placeholder="e.g. Nairobi, Kenya or Remote" />
              </div>
              <div class="form-group">
                <label>Employment Type</label>
                <select name="employmentType" class="form-control">
                  <option value="full-time">Full-time</option>
                  <option value="part-time">Part-time</option>
                  <option value="contract">Contract</option>
                  <option value="internship">Internship</option>
                </select>
              </div>
              <div class="form-group">
                <label>Job Description *</label>
                <textarea name="description" class="form-control" required rows="5" placeholder="Describe the role, responsibilities, and team..."></textarea>
              </div>
              <div class="form-group">
                <label>Required Skills (comma-separated) *</label>
                <input type="text" name="requiredSkills" class="form-control" required placeholder="JavaScript, React, Node.js, SQL" />
              </div>
              <div class="form-group">
                <label>Minimum Experience (years)</label>
                <input type="number" name="minExperience" class="form-control" min="0" value="0" />
              </div>
              <div class="form-group">
                <label>Required Education</label>
                <input type="text" name="requiredEducation" class="form-control" placeholder="e.g. Bachelor's in Computer Science" />
              </div>
              <div class="form-group">
                <label>Required Certifications (comma-separated)</label>
                <input type="text" name="requiredCertifications" class="form-control" placeholder="AWS Certified, PMP" />
              </div>
              <button type="submit" class="btn btn-primary">Publish Job</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../scripts/api.js"></script>
  <script src="../scripts/loader.js"></script>
  <script src="../scripts/portal-ui.js"></script>
  <script src="../scripts/dashboard.js"></script>
  <script src="../scripts/employer-jobs.js"></script>
  <script>
    requireAuth(['employer']);
    initSidebar('create-job');
    const u = getUser();
    document.getElementById('post-as-banner').textContent =
      u?.email ? `Publishing as: ${u.email}` : 'Publishing as employer';
    document.getElementById('job-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const btn = f.querySelector('button[type=submit]');
      const alertEl = document.getElementById('form-alert');
      setButtonLoading(btn, true, 'Publish Job', 'Publishing...');
      try {
        const skills = f.requiredSkills.value.split(',').map((s) => s.trim()).filter(Boolean);
        const certs = f.requiredCertifications.value.split(',').map((s) => s.trim()).filter(Boolean);
        const job = await api.createJob({
          title: f.title.value,
          location: f.location.value,
          employmentType: f.employmentType.value,
          description: f.description.value,
          requiredSkills: skills,
          minExperience: parseInt(f.minExperience.value, 10) || 0,
          requiredEducation: f.requiredEducation.value,
          requiredCertifications: certs,
        });
        markJobsUpdated(job.id);
        alertEl.className = 'alert alert-success';
        alertEl.textContent = 'Job published successfully! Redirecting...';
        alertEl.classList.remove('hidden');
        f.reset();
        setTimeout(() => { window.location.href = `dashboard.html?job=${job.id}`; }, 800);
      } catch (err) {
        alertEl.className = 'alert alert-error';
        alertEl.textContent = err.message;
        alertEl.classList.remove('hidden');
        setButtonLoading(btn, false, 'Publish Job');
      }
    });
  </script>
</body>
</html>
