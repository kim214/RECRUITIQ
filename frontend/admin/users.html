<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users — Reqruit IQ Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><a href="../home/index.html" class="logo"><span class="logo-icon">IQ</span> Reqruit IQ</a></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" data-page="dashboard"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="users.html" data-page="users"><span class="nav-icon">👥</span> Users</a>
        <a href="jobs.html" data-page="jobs"><span class="nav-icon">📋</span> Jobs</a>
        <a href="analytics.html" data-page="analytics"><span class="nav-icon">📈</span> Analytics</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip"><div class="user-avatar" id="user-avatar">A</div><div><div class="name" id="user-name"></div><div class="role" id="user-role"></div></div></div>
        <a href="#" id="logout-btn" class="btn btn-ghost btn-sm mt-2" style="width:100%;color:#94a3b8">Logout</a>
      </div>
    </aside>
    <main class="dashboard-main">
      <header class="dashboard-topbar"><h1>Users</h1></header>
      <div class="dashboard-content"><div class="panel"><div class="panel-body" id="users-table">Loading...</div></div></div>
    </main>
  </div>
  <script src="../scripts/api.js"></script>
  <script src="../scripts/dashboard.js"></script>
  <script>
    requireAuth(['admin']);
    initSidebar('users');
    apiRequest('/users').then((users) => {
      document.getElementById('users-table').innerHTML = `<table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead><tbody>
        ${users.map((u) => `<tr><td>${u.fullName}</td><td>${u.email}</td><td><span class="badge badge-primary">${u.role}</span></td><td>${formatDate(u.createdAt)}</td></tr>`).join('')}
      </tbody></table>`;
    }).catch((e) => { document.getElementById('users-table').innerHTML = e.message; });
  </script>
</body>
</html>
