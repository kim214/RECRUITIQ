<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shortlisting — Reqruit IQ</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
  <link rel="stylesheet" href="../assets/css/interactive.css" />
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><a href="../home/index.html" class="logo"><span class="logo-icon">IQ</span> Reqruit IQ</a></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" data-page="dashboard"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="create-job.html" data-page="create-job"><span class="nav-icon">➕</span> Post Job</a>
        <a href="candidates.html" data-page="candidates"><span class="nav-icon">👥</span> Candidates</a>
        <a href="shortlist.html" data-page="shortlist"><span class="nav-icon">✅</span> Shortlisting</a>
        <a href="rankings.html" data-page="rankings"><span class="nav-icon">🏆</span> AI Rankings</a>
        <a href="reports.html" data-page="reports"><span class="nav-icon">📈</span> Reports</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip"><div class="user-avatar" id="user-avatar">E</div><div><div class="name" id="user-name"></div><div class="role" id="user-role"></div></div></div>
        <a href="#" id="logout-btn" class="btn btn-ghost btn-sm mt-2" style="width:100%;color:#94a3b8">Logout</a>
      </div>
    </aside>
    <main class="dashboard-main">
      <header class="dashboard-topbar">
        <h1>Shortlisting Pipeline</h1>
        <select id="job-select" class="form-control" style="max-width:280px"></select>
      </header>
      <div class="dashboard-content">
        <p style="color:var(--text-muted);margin-bottom:1.25rem;font-size:0.95rem">
          Click any candidate to shortlist, schedule interviews, hire, or reject.
        </p>
        <div class="kanban-board" id="kanban-board">Loading pipeline...</div>
      </div>
    </main>
  </div>
  <script src="../scripts/api.js"></script>
  <script src="../scripts/dashboard.js"></script>
  <script src="../scripts/employer-ui.js"></script>
  <script>
    requireAuth(['employer']);
    initSidebar('shortlist');
    const jobSelect = document.getElementById('job-select');
    const board = document.getElementById('kanban-board');
    const jobParam = new URLSearchParams(window.location.search).get('job');

    async function loadPipeline() {
      const jobId = jobSelect.value;
      if (!jobId) { board.innerHTML = '<p>No jobs available.</p>'; return; }
      try {
        const data = await api.getPipeline(jobId);
        renderKanban(data.pipeline, board, jobId);
      } catch (e) {
        board.innerHTML = `<p class="alert alert-error">${e.message}</p>`;
      }
    }

    window.onCandidateUpdated = loadPipeline;

    (async () => {
      const jobs = await api.getJobs('?mine=1');
      jobSelect.innerHTML = jobs.map((j) => `<option value="${j.id}">${j.title}</option>`).join('');
      if (jobParam) jobSelect.value = jobParam;
      jobSelect.addEventListener('change', loadPipeline);
      await loadPipeline();
    })();
  </script>
</body>
</html>
