<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Reqruit IQ</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo-center"><a href="index.html" class="logo"><span class="logo-icon">IQ</span> Reqruit IQ</a></div>
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account</p>
      <div id="session-alert" class="alert alert-info hidden">Your session expired. Please log in again.</div>
      <div id="alert" class="alert hidden"></div>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" class="form-control" required placeholder="you@company.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" class="form-control" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
      </form>
      <p class="auth-footer">Don't have an account? <a href="register.html">Register</a></p>
      <p class="auth-footer" style="margin-top:0.75rem;font-size:0.8rem">
        Demo: employer@reqruit.com / employer123
      </p>
    </div>
  </div>
  <script src="../scripts/api.js"></script>
  <script>
    const user = getUser();
    if (user) redirectByRole(user.role);
    if (new URLSearchParams(window.location.search).get('expired')) {
      document.getElementById('session-alert').classList.remove('hidden');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const alertEl = document.getElementById('alert');
      try {
        const { token, user } = await api.login(f.email.value, f.password.value);
        setAuth(token, user);
        redirectByRole(user.role);
      } catch (err) {
        alertEl.className = 'alert alert-error';
        alertEl.textContent = err.message;
        alertEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
