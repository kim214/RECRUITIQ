<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Reqruit IQ</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><a href="../home/index.html" class="logo"><span class="logo-icon">IQ</span> Reqruit IQ</a></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" data-page="dashboard"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="users.html" data-page="users"><span class="nav-icon">👥</span> Users</a>
        <a href="jobs.html" data-page="jobs"><span class="nav-icon">📋</span> Jobs</a>
        <a href="analytics.html" data-page="analytics"><span class="nav-icon">📈</span> Analytics</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip"><div class="user-avatar" id="user-avatar">A</div><div><div class="name" id="user-name"></div><div class="role" id="user-role"></div></div></div>
        <a href="#" id="logout-btn" class="btn btn-ghost btn-sm mt-2" style="width:100%;color:#94a3b8">Logout</a>
      </div>
    </aside>
    <main class="dashboard-main">
      <header class="dashboard-topbar"><h1>Admin Dashboard</h1></header>
      <div class="dashboard-content">
        <div class="stats-grid" id="admin-stats"></div>
        <div class="panel">
          <div class="panel-header"><h2>Platform Overview</h2></div>
          <div class="panel-body" id="overview">Loading...</div>
        </div>
      </div>
    </main>
  </div>
  <script src="../scripts/api.js"></script>
  <script src="../scripts/dashboard.js"></script>
  <script>
    requireAuth(['admin']);
    initSidebar('dashboard');
    (async () => {
      const s = await api.adminStats();
      document.getElementById('admin-stats').innerHTML = `
        <div class="stat-card"><div class="label">Users</div><div class="value">${s.totalUsers}</div></div>
        <div class="stat-card"><div class="label">Employers</div><div class="value">${s.employers}</div></div>
        <div class="stat-card"><div class="label">Applicants</div><div class="value">${s.applicants}</div></div>
        <div class="stat-card"><div class="label">Applications</div><div class="value">${s.totalApplications}</div></div>`;
      document.getElementById('overview').innerHTML = `<p style="color:var(--text-muted)">${s.openJobs} open jobs · ${s.totalJobs} total jobs posted on the platform.</p>`;
    })();
  </script>
</body>
</html>
