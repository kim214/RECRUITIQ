<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Applicant Dashboard — Reqruit IQ</title>
  <link rel="icon" href="../assets/images/logo-icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
  <link rel="stylesheet" href="../assets/css/applicant.css" />
</head>
<body class="portal-applicant">
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><a href="../home/index.html" class="logo"><img src="../assets/images/logo-icon.svg" alt="" width="36" height="36" /><span class="logo-text">Reqruit <strong>IQ</strong></span></a></div>
      <span class="sidebar-badge">Applicant Portal</span>
      <nav class="sidebar-nav">
        <a href="dashboard.html" data-page="dashboard"><span class="nav-icon-svg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span> Dashboard</a>
        <a href="jobs.html" data-page="jobs"><span class="nav-icon-svg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></span> Browse Jobs</a>
        <a href="applications.html" data-page="applications"><span class="nav-icon-svg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M4 9h16M9 4v16"/></svg></span> My Applications</a>
        <a href="profile.html" data-page="profile"><span class="nav-icon-svg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span> Profile</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip"><div class="user-avatar" id="user-avatar">A</div><div><div class="name" id="user-name"></div><div class="role" id="user-role"></div></div></div>
        <a href="#" id="logout-btn" class="btn btn-ghost btn-sm mt-2" style="width:100%;color:#94a3b8">Logout</a>
      </div>
    </aside>
    <main class="dashboard-main">
      <header class="dashboard-topbar">
        <div class="topbar-title-wrap">
          <h1>My Dashboard</h1>
          <p class="topbar-subtitle">Track applications &amp; discover opportunities</p>
        </div>
        <a href="jobs.html" class="btn btn-primary btn-sm">Browse Jobs</a>
      </header>
      <div class="dashboard-content">
        <div class="applicant-welcome dash-welcome" id="welcome"></div>
        <p class="page-section-title">Your stats</p>
        <div class="stats-grid" id="stats" data-loader="Loading stats..."></div>
        <div class="panel">
          <div class="panel-header"><h2>Recent Applications</h2><a href="applications.html" class="btn btn-outline btn-sm">View All</a></div>
          <div class="panel-body" id="apps-list" data-loader="Loading applications..."></div>
        </div>
      </div>
    </main>
  </div>
  <script src="../scripts/api.js"></script>
  <script src="../scripts/loader.js"></script>
  <script src="../scripts/portal-ui.js"></script>
  <script src="../scripts/dashboard.js"></script>
  <script>
    requireAuth(['applicant']);
    initSidebar('dashboard');
    const user = getUser();
    document.getElementById('welcome').innerHTML = buildWelcomeBanner(
      `Welcome back, ${user?.fullName || 'Applicant'}!`,
      'Track your applications and discover new job opportunities matched by AI.',
      '🎯'
    );

    (async () => {
      try {
        const apps = await api.getApplications();
        document.getElementById('stats').innerHTML = [
          buildStatCard({ label: 'Total Applications', value: apps.length, icon: 'apps', accent: 'teal' }),
          buildStatCard({ label: 'In Review', value: apps.filter(a => ['submitted','ai_screening'].includes(a.status)).length, icon: 'pending', accent: 'amber' }),
          buildStatCard({ label: 'Shortlisted', value: apps.filter(a => a.status === 'shortlisted').length, icon: 'star', accent: 'rose' }),
          buildStatCard({ label: 'Interviews', value: apps.filter(a => a.status === 'interview_scheduled').length, icon: 'calendar', accent: 'violet' }),
        ].join('');
        const el = document.getElementById('apps-list');
        if (!apps.length) {
          el.innerHTML = buildEmptyState('📨', 'No applications yet', 'Browse open jobs and apply with your resume to get started. <a href="jobs.html">Browse jobs</a>');
          return;
        }
        el.innerHTML = `<table class="data-table"><thead><tr><th>Job</th><th>Status</th><th>AI Score</th><th>Documents</th><th>Applied</th></tr></thead><tbody>
          ${apps.slice(0,5).map(a => `<tr>
            <td><strong>${a.jobTitle}</strong></td>
            <td><span class="badge badge-info">${a.stageLabel}</span></td>
            <td>${a.aiScore != null ? '<strong>'+Math.round(a.aiScore)+'%</strong>' : '—'}</td>
            <td class="doc-links">${a.resumeUrl ? '<a href="'+a.resumeUrl+'" target="_blank">📄 Resume</a>' : '—'}</td>
            <td>${formatDate(a.appliedAt)}</td>
          </tr>`).join('')}
        </tbody></table>`;
      } catch (e) {
        document.getElementById('apps-list').innerHTML = `<p class="alert alert-error">${e.message}</p>`;
      }
    })();
  </script>
</body>
</html>
